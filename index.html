<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta id="viewport-meta" name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function() {
        try {
          const saved = localStorage.getItem('hydromines_viewport_mode');
          // Par défaut, forcer le mode Bureau (desktop) sur appareils mobiles
          const isDesktop = saved === null || saved === 'desktop';
          if (isDesktop) {
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            if (isMobile) {
              const vp = document.getElementById('viewport-meta');
              if (vp) {
                vp.setAttribute('content', 'width=1280, initial-scale=0.27, minimum-scale=0.1, maximum-scale=5.0');
              }
            }
          }
        } catch (e) {
          console.error('[Viewport Init]', e);
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#d4af37" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Hydromines" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <title>Hydromines Suivi magasinier</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
